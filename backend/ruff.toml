# Ruff configuration for AccountantOS backend
# https://docs.astral.sh/ruff/configuration/

target-version = "py312"
line-length = 120

[lint]
select = [
    "E",      # pycodestyle errors
    "F",      # Pyflakes
    "W",      # pycodestyle warnings
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "RUF",    # Ruff-specific rules
]

ignore = [
    "E501",   # line too long (handled by line-length)
    "B008",   # do not perform function call in argument defaults (common in FastAPI Depends)
    "B904",   # within an except clause, raise exceptions with from
    "SIM102", # use a single if statement instead of nested if statements
    "SIM105", # use contextlib.suppress instead of try/except/pass
    "SIM108", # use ternary operator instead of if-else
    "RUF001", # string contains ambiguous unicode characters
    "RUF002", # docstring contains ambiguous unicode characters
    "RUF012", # mutable class attributes should be annotated with typing.ClassVar
]

[lint.per-file-ignores]
"__init__.py" = [
    "F401",   # unused imports in __init__.py are intentional (re-exports)
    "F403",   # star imports
]
"app/api/*.py" = [
    "F401",   # unused imports may exist in API modules
]
"app/models/__init__.py" = [
    "F401",   # model re-exports
]
"tests/*.py" = [
    "F841",   # unused variables in tests are OK (fixtures, setup)
]
"alembic/*.py" = [
    "F401",   # alembic migrations may have unused imports
]

[lint.isort]
known-first-party = ["app"]
