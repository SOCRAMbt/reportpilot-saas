name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ============================================
  # BACKEND LINTING
  # ============================================
  backend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          cd backend
          ruff check app --fix --select=F,E

  # ============================================
  # BACKEND TESTS (SQLite in-memory, no PostgreSQL/Redis needed)
  # ============================================
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-cov pytest-anyio

      - name: Run tests
        env:
          # Force SQLite in-memory for CI tests
          DATABASE_URL_OVERRIDE: "sqlite+aiosqlite:///:memory:"
          REDIS_ENABLED: "false"
          SECRET_KEY: "ci_test_secret_key_must_be_at_least_32_chars"
          JWT_SECRET_KEY: "ci_test_jwt_secret_key_must_be_32_chars"
          HMAC_SALT_MASTER: "ci_test_hmac_salt_must_be_at_least_32"
          ARCA_CERT_PATH: "/tmp/test_cert.cer"
          ARCA_KEY_PATH: "/tmp/test_key.key"
          ARCA_CA_PATH: "/tmp/test_ca.crt"
          ARCA_CUIT_ESTUDIO: "20123456789"
        run: |
          cd backend
          pytest --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ============================================
  # FRONTEND TESTS & LINT
  # ============================================
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
        run: |
          cd frontend
          npm run build

  # ============================================
  # SECURITY SCAN
  # ============================================
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety

      - name: Check vulnerabilities
        run: |
          cd backend
          safety check -r requirements.txt --full-report || true

  # ============================================
  # DOCKER BUILD
  # ============================================
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -t accountantos-backend ./backend

      - name: Build frontend Docker image
        run: |
          docker build -t accountantos-frontend ./frontend

      - name: Test docker-compose
        run: |
          cd docker
          docker-compose config
